name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check
        run: |
          python -c "from main import app; print('app OK')"
          python -c "from exchange.bybit import BybitClient; print('bybit OK')"
          python -c "from strategy.scanner import scan_all; print('scanner OK')"
          python -c "from api.routes import router; print('routes OK')"
