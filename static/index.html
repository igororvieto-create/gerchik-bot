<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#f0b90b"/>
  <title>Bybit OI Scanner</title>
  <link rel="manifest" href="/manifest.json"/>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #f0b90b;
      --green:   #3fb950;
      --red:     #f85149;
      --blue:    #58a6ff;
      --purple:  #bc8cff;
      --orange:  #ffa657;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
      font-size: 14px;
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--green); }
    .status-dot.scanning  { background: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #status-text { color: var(--muted); font-size: 12px; }
    .spacer { flex: 1; }
    .scan-meta { font-size: 11px; color: var(--muted); text-align: right; }

    main { padding: 12px; max-width: 900px; margin: 0 auto; }

    /* Stats bar */
    .stats-row {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
    }
    .stat-chip .val { font-weight: 600; color: var(--text); }
    .stat-chip .lbl { color: var(--muted); }

    /* Filter bar */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .filter-btn {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

    /* Signal cards */
    #signals-list { display: flex; flex-direction: column; gap: 8px; }
    .signal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 12px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .signal-card.new-signal { border-color: var(--accent); }
    .signal-top {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .sym { font-weight: 700; font-size: 15px; }
    .badge {
      font-size: 11px; font-weight: 600; padding: 2px 7px;
      border-radius: 4px; letter-spacing: 0.3px;
    }
    .badge-LONG       { background: rgba(63,185,80,.15);  color: var(--green);  }
    .badge-SHORT      { background: rgba(248,81,73,.15);  color: var(--red);    }
    .badge-NEUTRAL    { background: rgba(139,148,158,.15);color: var(--muted);  }
    .badge-ACCUMULATION  { background: rgba(63,185,80,.10);  color: var(--green);  }
    .badge-DISTRIBUTION  { background: rgba(248,81,73,.10);  color: var(--red);    }
    .badge-SQUEEZE       { background: rgba(188,140,255,.15);color: var(--purple); }
    .badge-VOLUME_SPIKE  { background: rgba(240,185,11,.15); color: var(--accent); }
    .badge-FUNDING_EXTREME{background: rgba(255,166,87,.15); color: var(--orange); }
    .badge-MOMENTUM      { background: rgba(88,166,255,.15); color: var(--blue);   }
    .score-bar { font-size: 12px; color: var(--muted); }
    .score-val { font-weight: 700; }
    .score-val.high  { color: var(--green);  }
    .score-val.med   { color: var(--accent); }
    .score-val.low   { color: var(--muted);  }
    .signal-meta {
      font-size: 12px; color: var(--muted);
      display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px;
    }
    .signal-meta span { display: flex; align-items: center; gap: 3px; }
    .meta-pos { color: var(--green); }
    .meta-neg { color: var(--red); }
    .signal-ts { font-size: 11px; color: var(--muted); text-align: right; white-space: nowrap; }
    .price-val { font-weight: 600; font-size: 13px; }

    /* Empty state */
    .empty {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty .icon { font-size: 40px; margin-bottom: 8px; }

    /* Scrollable on mobile */
    @media (max-width: 480px) {
      .signal-meta { gap: 8px; }
    }
  </style>
</head>
<body>

<header>
  <div class="status-dot" id="status-dot"></div>
  <h1>📈 Bybit OI Scanner</h1>
  <span id="status-text">Подключение…</span>
  <div class="spacer"></div>
  <div class="scan-meta" id="scan-meta"></div>
</header>

<main>
  <div class="stats-row" id="stats-row">
    <div class="stat-chip"><span class="val" id="stat-total">—</span> <span class="lbl">сигналов 24h</span></div>
    <div class="stat-chip"><span class="val" id="stat-long">—</span> <span class="lbl">LONG</span></div>
    <div class="stat-chip"><span class="val" id="stat-short">—</span> <span class="lbl">SHORT</span></div>
    <div class="stat-chip"><span class="val" id="stat-scans">—</span> <span class="lbl">сканов</span></div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-filter="ALL">Все</button>
    <button class="filter-btn" data-filter="LONG">🟢 LONG</button>
    <button class="filter-btn" data-filter="SHORT">🔴 SHORT</button>
    <button class="filter-btn" data-filter="ACCUMULATION">Аккумуляция</button>
    <button class="filter-btn" data-filter="DISTRIBUTION">Дистрибуция</button>
    <button class="filter-btn" data-filter="SQUEEZE">Сквиз</button>
    <button class="filter-btn" data-filter="VOLUME_SPIKE">Объём</button>
    <button class="filter-btn" data-filter="FUNDING_EXTREME">Фандинг</button>
  </div>

  <div id="signals-list">
    <div class="empty"><div class="icon">⏳</div><p>Ожидание первых сигналов…</p></div>
  </div>
</main>

<script>
  const signals = [];
  let activeFilter = 'ALL';
  let wsConnected = false;
  let pingInterval = null;

  const dot  = document.getElementById('status-dot');
  const stxt = document.getElementById('status-text');
  const meta = document.getElementById('scan-meta');

  function scoreClass(s) {
    if (s >= 70) return 'high';
    if (s >= 50) return 'med';
    return 'low';
  }

  function fmtTime(isoStr) {
    const d = new Date(isoStr);
    return d.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }

  function fmtPrice(p) {
    if (p >= 1000) return p.toLocaleString('en-US', {maximumFractionDigits:2});
    if (p >= 1)    return p.toFixed(4);
    return p.toFixed(6);
  }

  function renderCard(sig, isNew = false) {
    const oi    = sig.oi_change >= 0 ? `<span class="meta-pos">+${sig.oi_change.toFixed(1)}%</span>` : `<span class="meta-neg">${sig.oi_change.toFixed(1)}%</span>`;
    const fund  = sig.funding >= 0 ? `<span class="meta-pos">+${sig.funding.toFixed(3)}%</span>` : `<span class="meta-neg">${sig.funding.toFixed(3)}%</span>`;
    const obCls = sig.ob_bias === 'BUY' ? 'meta-pos' : sig.ob_bias === 'SELL' ? 'meta-neg' : '';

    return `
      <div class="signal-card${isNew?' new-signal':''}" data-dir="${sig.direction}" data-type="${sig.signal_type}">
        <div>
          <div class="signal-top">
            <span class="sym">${sig.symbol}</span>
            <span class="badge badge-${sig.direction}">${sig.direction}</span>
            <span class="badge badge-${sig.signal_type}">${sig.signal_type}</span>
          </div>
          <div class="signal-meta">
            <span>💰 <span class="price-val">${fmtPrice(sig.price)}</span></span>
            <span>📊 OI ${oi}</span>
            <span>📦 vol ${sig.vol_ratio.toFixed(1)}×</span>
            <span>💸 ${fund}</span>
            <span>📖 OB <span class="${obCls}">${sig.ob_bias}</span></span>
            <span>📉 ATR ${sig.atr_pct.toFixed(2)}%</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <div class="score-bar">Score <span class="score-val ${scoreClass(sig.score)}">${sig.score}</span></div>
          <div class="signal-ts">${fmtTime(sig.ts)}</div>
        </div>
      </div>`;
  }

  function applyFilter() {
    const list = document.getElementById('signals-list');
    const filtered = activeFilter === 'ALL' ? signals :
      signals.filter(s =>
        s.direction === activeFilter || s.signal_type === activeFilter
      );

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty"><div class="icon">🔍</div><p>Нет сигналов по фильтру</p></div>';
      return;
    }
    list.innerHTML = filtered.map((s, i) => renderCard(s, i === 0 && signals.length > 0)).join('');
    // Remove 'new' class after animation
    setTimeout(() => {
      const cards = list.querySelectorAll('.new-signal');
      cards.forEach(c => c.classList.remove('new-signal'));
    }, 600);
  }

  function addSignal(sig) {
    // Deduplicate: remove older entry for same symbol+type combo
    const idx = signals.findIndex(s => s.symbol === sig.symbol && s.signal_type === sig.signal_type);
    if (idx !== -1) signals.splice(idx, 1);
    signals.unshift(sig);
    if (signals.length > 200) signals.pop();
    applyFilter();
  }

  function loadHistory(data) {
    for (const row of data) {
      signals.push(row);
    }
    signals.sort((a, b) => new Date(b.ts) - new Date(a.ts));
    applyFilter();
  }

  async function loadStats() {
    try {
      const r = await fetch('/api/stats');
      const d = await r.json();
      document.getElementById('stat-total').textContent  = d.total_24h ?? '—';
      document.getElementById('stat-long').textContent   = d.by_direction?.LONG  ?? 0;
      document.getElementById('stat-short').textContent  = d.by_direction?.SHORT ?? 0;
      document.getElementById('stat-scans').textContent  = d.scan_count ?? '—';
    } catch(e) {}
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      wsConnected = true;
      dot.className  = 'status-dot connected';
      stxt.textContent = 'Подключено';
      pingInterval = setInterval(() => ws.readyState === 1 && ws.send('ping'), 25000);
      loadStats();
    };

    ws.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'history') {
          loadHistory(msg.data || []);
        } else if (msg.type === 'signal') {
          addSignal(msg.data);
          loadStats();
        } else if (msg.type === 'heartbeat') {
          const t = msg.last_scan_at ? new Date(msg.last_scan_at).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}) : '—';
          meta.textContent = `Скан #${msg.scan_count} | ${t} | найдено: ${msg.signals_found}`;
          dot.className = 'status-dot connected';
        }
      } catch(e) {}
    };

    ws.onerror = () => {
      dot.className = 'status-dot';
      stxt.textContent = 'Ошибка';
    };

    ws.onclose = () => {
      wsConnected = false;
      dot.className = 'status-dot';
      stxt.textContent = 'Отключено — переподключение…';
      if (pingInterval) clearInterval(pingInterval);
      setTimeout(connect, 3000);
    };
  }

  // Filter buttons
  document.getElementById('filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilter();
  });

  // Service worker registration
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  connect();
  setInterval(loadStats, 30000);
</script>
</body>
</html>
