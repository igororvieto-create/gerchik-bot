<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#f0b90b"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Gerchik Bot</title>
  <link rel="manifest" href="/manifest.json"/>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --card:    #1c2129;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #f0b90b;
      --green:   #3fb950;
      --red:     #f85149;
      --blue:    #58a6ff;
      --purple:  #bc8cff;
      --orange:  #ffa657;
      --green-bg: rgba(63,185,80,.12);
      --red-bg:   rgba(248,81,73,.12);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,monospace;font-size:13px;min-height:100vh}

    /* ── Header ── */
    header{
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:8px 14px;display:flex;align-items:center;gap:8px;
      position:sticky;top:0;z-index:20;flex-wrap:wrap;
    }
    .logo{font-size:16px;font-weight:700;color:var(--accent);letter-spacing:-.5px;white-space:nowrap}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
    .dot.ok{background:var(--green)}.dot.scan{background:var(--accent);animation:blink 1s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    #conn-label{color:var(--muted);font-size:11px;white-space:nowrap}
    .hspacer{flex:1}
    #scan-info{font-size:11px;color:var(--muted);text-align:right;line-height:1.4;min-width:0}
    .scan-btn{
      background:var(--accent);color:#000;border:none;border-radius:6px;
      padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;
      transition:opacity .15s;white-space:nowrap;flex-shrink:0;
    }
    .scan-btn:disabled{opacity:.5;cursor:default}
    .scan-btn:active{opacity:.8}

    /* ── Stats bar ── */
    .stats-bar{
      display:flex;gap:6px;flex-wrap:wrap;
      padding:8px 14px 0;max-width:960px;margin:0 auto;
    }
    .chip{
      background:var(--surface);border:1px solid var(--border);
      border-radius:6px;padding:4px 10px;font-size:12px;white-space:nowrap;
    }
    .chip .v{font-weight:700}.chip .l{color:var(--muted)}
    .chip.long-chip .v{color:var(--green)}.chip.short-chip .v{color:var(--red)}
    .chip.green-chip{border-color:rgba(63,185,80,.4)}.chip.green-chip .v{color:var(--green)}
    .chip.yellow-chip{border-color:rgba(240,185,11,.4)}.chip.yellow-chip .v{color:var(--accent)}

    /* ── Sort + Filters ── */
    .toolbar{
      display:flex;gap:6px;flex-wrap:wrap;align-items:center;
      padding:8px 14px;max-width:960px;margin:0 auto;
    }
    .fb{
      padding:4px 10px;border-radius:20px;border:1px solid var(--border);
      background:transparent;color:var(--muted);font-size:12px;cursor:pointer;
      transition:all .15s;
    }
    .fb:hover{border-color:var(--accent);color:var(--text)}
    .fb.on{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
    .sort-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}

    /* ── Signal list ── */
    #list{display:flex;flex-direction:column;gap:8px;padding:4px 14px 30px;max-width:960px;margin:0 auto}

    /* ── Signal card ── */
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;animation:fadeIn .25s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
    .card.fresh{border-color:var(--accent)}
    .card.long-card{border-left:3px solid var(--green)}
    .card.short-card{border-left:3px solid var(--red)}

    .card-head{display:flex;align-items:center;gap:8px;padding:10px 14px 6px;flex-wrap:wrap}
    .sym{font-size:16px;font-weight:700;font-family:monospace;cursor:pointer}
    .sym:hover{color:var(--accent)}
    .dir-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
    .dir-LONG{background:var(--green-bg);color:var(--green)}
    .dir-SHORT{background:var(--red-bg);color:var(--red)}
    .type-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.4px}
    .t-ACCUMULATION{background:rgba(63,185,80,.1);color:var(--green)}
    .t-DISTRIBUTION{background:rgba(248,81,73,.1);color:var(--red)}
    .t-SQUEEZE{background:rgba(188,140,255,.15);color:var(--purple)}
    .t-VOLUME_SPIKE{background:rgba(240,185,11,.12);color:var(--accent)}
    .t-FUNDING_EXTREME{background:rgba(255,166,87,.15);color:var(--orange)}
    .t-MOMENTUM{background:rgba(88,166,255,.12);color:var(--blue)}
    .head-spacer{flex:1}
    .score-pill{font-size:12px;font-weight:700;padding:2px 9px;border-radius:12px;background:var(--surface)}
    .score-hi{color:var(--green)}.score-md{color:var(--accent)}.score-lo{color:var(--muted)}
    .ts-label{font-size:11px;color:var(--muted)}

    /* ── Level bar ── */
    .level-bar-wrap{padding:4px 14px 8px}
    .level-bar-track{position:relative;height:26px;background:var(--surface);border-radius:6px;overflow:hidden}
    .level-segment{position:absolute;top:0;bottom:0}
    .seg-loss{background:rgba(248,81,73,.18)}
    .seg-tp1{background:rgba(240,185,11,.12)}
    .seg-tp2{background:rgba(63,185,80,.14)}
    .seg-tp3{background:rgba(63,185,80,.22)}
    .level-line{position:absolute;top:0;bottom:0;width:2px}
    .lline-sl{background:var(--red)}.lline-entry{background:var(--accent);width:3px}
    .lline-tp2{background:var(--green)}.lline-tp3{background:var(--green)}
    .level-label{position:absolute;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;padding:0 3px;white-space:nowrap;pointer-events:none}
    .ll-sl{color:var(--red)}.ll-e{color:var(--accent)}.ll-tp{color:var(--green)}

    /* ── Levels row ── */
    .levels-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border)}
    .lv-cell{background:var(--card);padding:7px 10px;text-align:center}
    .lv-cell .lk{font-size:10px;color:var(--muted)}
    .lv-cell .lv{font-size:12px;font-weight:700;font-family:monospace}
    .lv-sl .lv{color:var(--red)}.lv-en .lv{color:var(--accent)}.lv-tp2 .lv,.lv-tp3 .lv{color:var(--green)}

    /* ── Metrics ── */
    .metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:1px;background:var(--border);border-top:1px solid var(--border)}
    .metric{background:var(--card);padding:7px 12px;display:flex;flex-direction:column;gap:2px}
    .metric .mk{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    .metric .mv{font-size:13px;font-weight:600;font-family:monospace}
    .mv.pos{color:var(--green)}.mv.neg{color:var(--red)}.mv.neu{color:var(--muted)}

    /* ── Card footer ── */
    .card-foot{padding:6px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
    .bybit-link{font-size:11px;color:var(--blue);text-decoration:none}
    .bybit-link:hover{text-decoration:underline}
    .chart-btn{background:rgba(88,166,255,.12);border:none;border-radius:6px;padding:3px 10px;color:var(--blue);font-size:11px;cursor:pointer}
    .chart-btn:hover{background:rgba(88,166,255,.22)}
    .foot-spacer{flex:1}
    .rr-chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(88,166,255,.12);color:var(--blue)}

    /* ── Positions panel ── */
    #positions-panel{max-width:960px;margin:6px auto 0;padding:0 14px;display:none}
    .panel-title{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}

    /* ── Chart modal ── */
    #chart-modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.9);flex-direction:column}
    #chart-modal.open{display:flex}
    .chart-hdr{background:var(--surface);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
    .chart-hdr h2{font-size:15px;font-weight:600;color:var(--text)}
    .chart-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:0 4px}
    #chart-frame{flex:1;border:none;width:100%;background:#131722}

    /* ── Empty ── */
    .empty{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty .ico{font-size:42px;margin-bottom:10px}

    @media(max-width:480px){
      .levels-row{grid-template-columns:repeat(2,1fr)}
      .metrics{grid-template-columns:repeat(2,1fr)}
      .logo{font-size:14px}
      #scan-info{display:none}
    }
  </style>
</head>
<body>

<header>
  <div class="logo">📈 Gerchik Bot</div>
  <div class="dot" id="dot"></div>
  <span id="conn-label">Подключение…</span>
  <div class="hspacer"></div>
  <div id="scan-info"></div>
  <button class="scan-btn" id="scan-btn" onclick="triggerScan()">🔍 Скан</button>
</header>

<div class="stats-bar">
  <div class="chip"><span class="v" id="s-total">—</span> <span class="l">сигналов 24h</span></div>
  <div class="chip long-chip"><span class="v" id="s-long">—</span> <span class="l">LONG</span></div>
  <div class="chip short-chip"><span class="v" id="s-short">—</span> <span class="l">SHORT</span></div>
  <div class="chip"><span class="v" id="s-scans">—</span> <span class="l">сканов</span></div>
  <div class="chip"><span class="l">последний: </span><span class="v" id="s-lastscan">—</span></div>
  <div class="chip" id="balance-chip"><span class="l">баланс: </span><span class="v" id="s-balance">—</span><span class="l"> USDT</span></div>
  <div class="chip" id="trade-chip" style="display:none"><span class="l">торговля: </span><span class="v" id="s-trade">—</span></div>
  <div class="chip" id="pos-chip" style="display:none"><span class="v" id="s-positions">0</span> <span class="l">позиций</span></div>
</div>

<div id="positions-panel">
  <div class="panel-title">📋 Открытые позиции</div>
  <div id="positions-list"></div>
</div>

<div class="toolbar" id="toolbar">
  <button class="fb on" data-f="ALL">Все</button>
  <button class="fb" data-f="LONG">🟢 LONG</button>
  <button class="fb" data-f="SHORT">🔴 SHORT</button>
  <button class="fb" data-f="ACCUMULATION">Аккумуляция</button>
  <button class="fb" data-f="DISTRIBUTION">Дистрибуция</button>
  <button class="fb" data-f="SQUEEZE">Сквиз</button>
  <button class="fb" data-f="VOLUME_SPIKE">Объём</button>
  <button class="fb" data-f="FUNDING_EXTREME">Фандинг</button>
  <button class="fb" data-f="MOMENTUM">Моментум</button>
  <div class="sort-sep"></div>
  <button class="fb on" data-s="score" id="sort-score">↓ Счёт</button>
  <button class="fb" data-s="time" id="sort-time">↓ Время</button>
</div>

<div id="list">
  <div class="empty"><div class="ico">⏳</div><p>Ожидание первого скана…</p></div>
</div>

<!-- Chart modal -->
<div id="chart-modal">
  <div class="chart-hdr">
    <h2 id="chart-title">График</h2>
    <button class="chart-close" id="chart-close">✕</button>
  </div>
  <iframe id="chart-frame" allowfullscreen></iframe>
</div>

<script>
'use strict';
const signals = [];
let activeFilter = 'ALL';
let activeSort   = 'score';
let scanInProgress = false;

/* ── Helpers ── */
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function fmtP(p) {
  if (p == null || p === 0) return '—';
  if (p >= 10000) return p.toLocaleString('en-US', {maximumFractionDigits:0});
  if (p >= 1000)  return p.toFixed(1);
  if (p >= 10)    return p.toFixed(2);
  if (p >= 1)     return p.toFixed(4);
  if (p >= 0.01)  return p.toFixed(5);
  return p.toFixed(6);
}

function fmtT(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function scoreCls(s) { return s >= 70 ? 'score-hi' : s >= 50 ? 'score-md' : 'score-lo'; }

/* ── Level bar ── */
function levelBar(sig) {
  const {entry, sl, tp1, tp2, tp3, direction} = sig;
  if (!entry || !sl || !tp2) return '';
  const isLong = direction === 'LONG';
  const lo = isLong ? sl : tp3;
  const hi = isLong ? tp3 : sl;
  const span = hi - lo;
  if (span <= 0) return '';
  const pct  = v => ((v - lo) / span * 100).toFixed(2) + '%';
  const w    = (a, b) => (Math.abs(b - a) / span * 100).toFixed(2) + '%';
  const slP  = pct(sl), eP = pct(entry), tp1P = pct(tp1||entry), tp2P = pct(tp2), tp3P = pct(tp3);
  const segs = isLong
    ? `<div class="level-segment seg-loss" style="left:${slP};width:${w(sl,entry)}"></div>
       <div class="level-segment seg-tp1"  style="left:${eP};width:${w(entry,tp1||entry)}"></div>
       <div class="level-segment seg-tp2"  style="left:${tp1P};width:${w(tp1||entry,tp2)}"></div>
       <div class="level-segment seg-tp3"  style="left:${tp2P};width:${w(tp2,tp3)}"></div>`
    : `<div class="level-segment seg-tp3"  style="left:${tp3P};width:${w(tp3,tp2)}"></div>
       <div class="level-segment seg-tp2"  style="left:${tp2P};width:${w(tp2,tp1||entry)}"></div>
       <div class="level-segment seg-tp1"  style="left:${tp1P};width:${w(tp1||entry,entry)}"></div>
       <div class="level-segment seg-loss" style="left:${eP};width:${w(entry,sl)}"></div>`;
  return `<div class="level-bar-wrap"><div class="level-bar-track">${segs}
    <div class="level-line lline-sl" style="left:${slP}"><span class="level-label ll-sl" style="left:2px">SL</span></div>
    <div class="level-line lline-entry" style="left:${eP}"><span class="level-label ll-e" style="left:4px">Вход</span></div>
    <div class="level-line lline-tp2" style="left:${tp2P}"><span class="level-label ll-tp" style="left:2px">TP2</span></div>
    <div class="level-line lline-tp3" style="left:${tp3P}"><span class="level-label ll-tp" style="right:2px">TP3</span></div>
  </div></div>`;
}

/* ── Card ── */
function card(sig) {
  const isLong = sig.direction === 'LONG';
  const oi   = typeof sig.oi_change === 'number'
    ? `<span class="mv ${sig.oi_change>=0?'pos':'neg'}">${sig.oi_change>=0?'+':''}${sig.oi_change.toFixed(1)}%</span>`
    : '<span class="mv neu">—</span>';
  const fund = typeof sig.funding === 'number'
    ? `<span class="mv ${sig.funding>=0?'pos':'neg'}">${sig.funding>=0?'+':''}${sig.funding.toFixed(3)}%</span>`
    : '<span class="mv neu">—</span>';
  const obCls = sig.ob_bias === 'BUY' ? 'pos' : sig.ob_bias === 'SELL' ? 'neg' : 'neu';
  const sym   = esc(sig.symbol);
  const stype = esc(sig.signal_type || '');

  return `<div class="card ${isLong?'long-card':'short-card'}">
    <div class="card-head">
      <span class="sym" data-sym="${sym}">${sym.replace('USDT','')}<span style="color:var(--muted);font-size:12px">/USDT</span></span>
      <span class="dir-badge dir-${esc(sig.direction)}">${isLong?'🟢':'🔴'} ${esc(sig.direction)}</span>
      <span class="type-badge t-${stype}">${stype.replace('_',' ')}</span>
      <div class="head-spacer"></div>
      <span class="score-pill ${scoreCls(sig.score)}">${sig.score}/100</span>
      <span class="ts-label">${fmtT(sig.ts)}</span>
    </div>
    ${levelBar(sig)}
    <div class="levels-row">
      <div class="lv-cell lv-sl"><div class="lk">🔴 SL</div><div class="lv">${fmtP(sig.sl)}</div></div>
      <div class="lv-cell lv-en"><div class="lk">🟡 Вход</div><div class="lv">${fmtP(sig.entry||sig.price)}</div></div>
      <div class="lv-cell lv-tp2"><div class="lk">🟢 TP2</div><div class="lv">${fmtP(sig.tp2)}</div></div>
      <div class="lv-cell lv-tp3"><div class="lk">🚀 TP3</div><div class="lv">${fmtP(sig.tp3)}</div></div>
    </div>
    <div class="metrics">
      <div class="metric"><span class="mk">Цена</span><span class="mv">${fmtP(sig.price)}</span></div>
      <div class="metric"><span class="mk">OI 4h</span>${oi}</div>
      <div class="metric"><span class="mk">Объём</span><span class="mv">${typeof sig.vol_ratio==='number'?sig.vol_ratio.toFixed(1)+'×':'—'}</span></div>
      <div class="metric"><span class="mk">Фандинг</span>${fund}</div>
      <div class="metric"><span class="mk">Стакан</span><span class="mv ${obCls}">${esc(sig.ob_bias||'—')}</span></div>
      <div class="metric"><span class="mk">ATR</span><span class="mv">${typeof sig.atr_pct==='number'?sig.atr_pct.toFixed(2)+'%':'—'}</span></div>
    </div>
    <div class="card-foot">
      <button class="chart-btn" data-sym="${sym}">📊 График</button>
      <a class="bybit-link" href="https://www.bybit.com/trade/usdt/${sym}" target="_blank" rel="noopener">↗ Bybit</a>
      <div class="foot-spacer"></div>
      ${sig.sl_pct?`<span style="font-size:11px;color:var(--muted)">SL −${sig.sl_pct.toFixed(2)}%</span>`:''}
      <span class="rr-chip">R/R 1:${(sig.rr||2).toFixed(1)}</span>
    </div>
  </div>`;
}

/* ── Render ── */
function sorted(arr) {
  return [...arr].sort((a, b) =>
    activeSort === 'score'
      ? (b.score - a.score) || (new Date(b.ts) - new Date(a.ts))
      : new Date(b.ts) - new Date(a.ts)
  );
}

function render() {
  const list = document.getElementById('list');
  let data = signals;
  if (activeFilter !== 'ALL') {
    data = signals.filter(s => s.direction === activeFilter || s.signal_type === activeFilter);
  }
  data = sorted(data);
  if (!data.length) {
    list.innerHTML = '<div class="empty"><div class="ico">🔍</div><p>Нет сигналов по фильтру</p></div>';
    return;
  }
  list.innerHTML = data.map((s, i) => i === 0 ? card(s).replace('class="card ','class="card fresh ') : card(s)).join('');
  setTimeout(() => document.querySelectorAll('.fresh').forEach(el => el.classList.remove('fresh')), 700);
}

function addSignal(sig) {
  const idx = signals.findIndex(s => s.symbol === sig.symbol && s.signal_type === sig.signal_type);
  if (idx !== -1) signals.splice(idx, 1);
  signals.unshift(sig);
  if (signals.length > 300) signals.pop();
  render();
}

function loadHistory(data) {
  signals.length = 0;
  for (const r of data) signals.push(r);
  render();
}

/* ── Chart modal ── */
function openChart(sym) {
  const tvSym = 'BYBIT:' + sym + '.P';
  const url = 'https://s.tradingview.com/widgetembed/?frameElementId=tv_chart&symbol=' + tvSym +
    '&interval=240&theme=dark&style=1&locale=ru&toolbar_bg=%23161b22' +
    '&enable_publishing=0&hide_top_toolbar=0&studies=RSI%40tv-basicstudies%1FVolume%40tv-basicstudies&withdateranges=1';
  document.getElementById('chart-title').textContent = '📊 ' + sym + ' · 4H';
  document.getElementById('chart-frame').src = url;
  document.getElementById('chart-modal').classList.add('open');
}
function closeChart() {
  document.getElementById('chart-modal').classList.remove('open');
  document.getElementById('chart-frame').src = '';
}
document.getElementById('chart-close').onclick = closeChart;
document.getElementById('chart-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeChart(); });

/* ── Event delegation for cards ── */
document.getElementById('list').addEventListener('click', e => {
  const sym = e.target.closest('[data-sym]');
  if (sym) openChart(sym.dataset.sym);
});

/* ── Stats & balance ── */
async function refreshStats() {
  try {
    const d = await fetch('/api/stats').then(r => r.json());
    document.getElementById('s-total').textContent   = d.total_24h   ?? '—';
    document.getElementById('s-long').textContent    = d.by_direction?.LONG  ?? 0;
    document.getElementById('s-short').textContent   = d.by_direction?.SHORT ?? 0;
    document.getElementById('s-scans').textContent   = d.scan_count  ?? '—';
    if (d.last_scan_at)
      document.getElementById('s-lastscan').textContent =
        new Date(d.last_scan_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {}
}

async function refreshBalance() {
  try {
    const d = await fetch('/api/balance').then(r => r.json());
    document.getElementById('s-balance').textContent = d.balance > 0 ? d.balance.toFixed(2) : '—';
  } catch(e) {}
}

async function refreshPositions() {
  try {
    const d = await fetch('/api/positions').then(r => r.json());
    const pos = (d.positions || []).filter(Boolean);
    document.getElementById('s-positions').textContent = pos.length;
    document.getElementById('pos-chip').style.display = pos.length > 0 ? '' : 'none';
    const panel = document.getElementById('positions-panel');
    const plist = document.getElementById('positions-list');
    if (pos.length > 0) {
      panel.style.display = '';
      plist.innerHTML = pos.map(p => {
        const isLong = p.direction === 'LONG';
        const pnl = p.unrealised_pnl || 0;
        const pnlHtml = `<span class="mv ${pnl>=0?'pos':'neg'}" style="font-size:13px;font-weight:700">${pnl>=0?'+':''}${pnl.toFixed(2)} USDT</span>`;
        return `<div class="card ${isLong?'long-card':'short-card'}" style="margin-bottom:6px">
          <div class="card-head">
            <span class="sym">${esc(p.symbol).replace('USDT','')}<span style="color:var(--muted);font-size:12px">/USDT</span></span>
            <span class="dir-badge dir-${esc(p.direction)}">${isLong?'🟢':'🔴'} ${esc(p.direction)}</span>
            <div class="head-spacer"></div>${pnlHtml}
          </div>
          <div class="levels-row">
            <div class="lv-cell lv-sl"><div class="lk">🔴 SL</div><div class="lv">${fmtP(p.sl)}</div></div>
            <div class="lv-cell lv-en"><div class="lk">🟡 Вход</div><div class="lv">${fmtP(p.entry)}</div></div>
            <div class="lv-cell lv-tp2"><div class="lk">🟢 TP2</div><div class="lv">${fmtP(p.tp2)}</div></div>
            <div class="lv-cell lv-tp3"><div class="lk">🚀 TP3</div><div class="lv">${fmtP(p.tp3)}</div></div>
          </div>
        </div>`;
      }).join('');
    } else {
      panel.style.display = 'none';
    }
  } catch(e) {}
}

async function refreshTradeStatus() {
  try {
    const d = await fetch('/api/debug').then(r => r.json());
    const chip = document.getElementById('trade-chip');
    const lbl  = document.getElementById('s-trade');
    chip.style.display = '';
    if (d.auto_trade) {
      lbl.textContent = '🤖 Авто';
      lbl.style.color = 'var(--green)';
    } else {
      lbl.textContent = '👁 Мониторинг';
      lbl.style.color = 'var(--muted)';
    }
  } catch(e) {}
}

/* ── Manual scan ── */
async function triggerScan() {
  if (scanInProgress) return;
  scanInProgress = true;
  const btn = document.getElementById('scan-btn');
  btn.textContent = '⏳ Сканирую…';
  btn.disabled = true;
  try {
    const d = await fetch('/api/scan').then(r => r.json());
    document.getElementById('scan-info').textContent =
      `Скан завершён · найдено: ${d.signals_found ?? 0} · мин счёт: ${d.min_score ?? '—'}`;
    if (d.top10) d.top10.forEach(s => addSignal(s));
    refreshStats();
  } catch(e) {
    document.getElementById('scan-info').textContent = 'Ошибка скана';
  } finally {
    btn.textContent = '🔍 Скан';
    btn.disabled = false;
    scanInProgress = false;
  }
}

/* ── WebSocket ── */
let wsR = 0, pingTimer = null;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  const dot  = document.getElementById('dot');
  const conn = document.getElementById('conn-label');

  ws.onopen = () => {
    wsR = 0;
    dot.className = 'dot ok';
    conn.textContent = 'Подключено';
    pingTimer = setInterval(() => ws.readyState === 1 && ws.send('ping'), 25000);
    refreshStats(); refreshBalance(); refreshPositions(); refreshTradeStatus();
  };

  ws.onmessage = e => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'history') {
      loadHistory(msg.data || []);
    } else if (msg.type === 'signal') {
      dot.className = 'dot scan';
      setTimeout(() => dot.className = 'dot ok', 2000);
      addSignal(msg.data);
      refreshStats();
    } else if (msg.type === 'heartbeat') {
      const t = msg.last_scan_at
        ? new Date(msg.last_scan_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})
        : '—';
      document.getElementById('scan-info').textContent =
        `Скан #${msg.scan_count || 0} · ${t} · найдено: ${msg.signals_found ?? 0}`;
    }
  };

  ws.onerror = () => { dot.className = 'dot'; conn.textContent = 'Ошибка'; };
  ws.onclose = () => {
    dot.className = 'dot'; conn.textContent = 'Реконнект…';
    clearInterval(pingTimer);
    setTimeout(connect, Math.min(1000 * 2 ** wsR++, 30000));
  };
}

/* ── Toolbar ── */
document.getElementById('toolbar').addEventListener('click', e => {
  const fb = e.target.closest('.fb');
  if (!fb) return;
  if (fb.dataset.f !== undefined) {
    document.querySelectorAll('[data-f]').forEach(b => b.classList.remove('on'));
    fb.classList.add('on');
    activeFilter = fb.dataset.f;
  } else if (fb.dataset.s !== undefined) {
    document.querySelectorAll('[data-s]').forEach(b => b.classList.remove('on'));
    fb.classList.add('on');
    activeSort = fb.dataset.s;
  }
  render();
});

/* ── Boot ── */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
connect();
setInterval(refreshStats, 30000);
setInterval(refreshBalance, 60000);
setInterval(refreshPositions, 15000);
</script>
