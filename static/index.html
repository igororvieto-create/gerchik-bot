<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#17212b"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="google" content="notranslate"/>
  <meta http-equiv="Content-Language" content="ru"/>
  <title>Gerchik Bot</title>
  <link rel="manifest" href="/manifest.json"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#17212b;
      --surface:#232e3c;
      --bubble:#182533;
      --sent:#2b5278;
      --text:#e8edf2;
      --muted:#708499;
      --blue:#5288c1;
      --green:#4dcd5c;
      --red:#ec3942;
      --yellow:#f0b90b;
      --border:rgba(255,255,255,0.06);
    }
    html,body{height:100%;overflow:hidden}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      font-size:14px;
      display:flex;
      flex-direction:column;
    }

    /* ── Header ── */
    header{
      background:var(--surface);
      padding:10px 14px;
      display:flex;
      align-items:center;
      gap:12px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .avatar{
      width:40px;height:40px;border-radius:50%;
      background:linear-gradient(135deg,#5288c1,#2b5278);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;flex-shrink:0;
    }
    .hinfo{flex:1;min-width:0}
    .hinfo h1{font-size:15px;font-weight:600;line-height:1.2}
    .hinfo .sub{font-size:12px;color:var(--muted)}
    .conn-dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--muted);flex-shrink:0;
      transition:background .3s;
    }
    .conn-dot.ok{background:var(--green)}
    .conn-dot.err{background:var(--red)}

    /* ── Stats bar ── */
    .stats{
      background:var(--surface);
      padding:6px 12px;
      display:flex;gap:6px;overflow-x:auto;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
      scrollbar-width:none;
    }
    .stats::-webkit-scrollbar{display:none}
    .chip{
      background:rgba(255,255,255,0.05);
      border-radius:12px;padding:3px 10px;
      font-size:11px;color:var(--muted);white-space:nowrap;
      flex-shrink:0;
    }
    .chip b{color:var(--text)}

    /* ── Chat ── */
    #chat{
      flex:1;overflow-y:auto;
      padding:10px 10px 6px;
      display:flex;flex-direction:column;gap:3px;
      scroll-behavior:smooth;
    }
    #chat::-webkit-scrollbar{width:3px}
    #chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

    .date-sep{
      text-align:center;font-size:11px;color:var(--muted);
      padding:8px 0;position:relative;
    }
    .date-sep::before,.date-sep::after{
      content:'';position:absolute;top:50%;
      width:35%;height:1px;background:var(--border);
    }
    .date-sep::before{left:0}.date-sep::after{right:0}

    /* Bot message bubble */
    .msg{
      max-width:88%;align-self:flex-start;
      background:var(--bubble);
      border-radius:4px 12px 12px 12px;
      padding:8px 12px;line-height:1.55;font-size:13px;
      animation:pop .18s ease;
    }
    /* User message bubble */
    .msg-u{
      align-self:flex-end;
      background:var(--sent);
      border-radius:12px 4px 12px 12px;
      max-width:70%;padding:6px 12px;
      font-size:13px;line-height:1.4;
      animation:pop .18s ease;
    }
    @keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

    /* Signal bubble */
    .sig{
      max-width:92%;align-self:flex-start;
      background:var(--bubble);
      border-radius:4px 12px 12px 12px;
      overflow:hidden;
      animation:pop .2s ease;
    }
    .sig-stripe{
      height:3px;
    }
    .long-stripe{background:var(--green)}
    .short-stripe{background:var(--red)}
    .sig-body{padding:10px 13px 8px}

    .sig-head{
      display:flex;align-items:center;gap:6px;
      margin-bottom:5px;flex-wrap:wrap;
    }
    .sym{font-size:15px;font-weight:700;font-family:monospace}
    .dir{
      font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;
    }
    .long-dir{background:rgba(77,205,92,.15);color:var(--green)}
    .short-dir{background:rgba(236,57,66,.15);color:var(--red)}
    .type-tag{
      font-size:10px;color:var(--muted);
      background:rgba(255,255,255,0.06);
      padding:1px 6px;border-radius:3px;
    }
    .score{
      margin-left:auto;font-size:12px;font-weight:700;
    }
    .s-hi{color:var(--green)}.s-md{color:var(--yellow)}.s-lo{color:var(--muted)}

    .sig-grid{
      display:grid;grid-template-columns:1fr 1fr;
      gap:5px;margin:6px 0;
    }
    .sg{background:rgba(255,255,255,0.04);border-radius:6px;padding:5px 8px}
    .sg .sl{font-size:10px;color:var(--muted);margin-bottom:1px}
    .sg .sv{font-size:12px;font-weight:600}

    .levels{
      background:rgba(255,255,255,0.03);
      border-radius:6px;padding:6px 8px;
      margin:5px 0;
      display:grid;grid-template-columns:repeat(4,1fr);gap:3px;
      text-align:center;
    }
    .lv .ll{font-size:9px;color:var(--muted)}
    .lv .lp{font-size:10px;font-weight:600;margin-top:1px}
    .lv.sl-lv .lp{color:var(--red)}
    .lv.entry-lv .lp{color:var(--yellow)}
    .lv.tp-lv .lp{color:var(--green)}

    .sig-stats{
      display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;
    }
    .stat-pill{
      font-size:10px;background:rgba(255,255,255,0.05);
      border-radius:10px;padding:2px 7px;color:var(--muted);
    }
    .stat-pill b{color:var(--text)}

    .sig-foot{
      display:flex;align-items:center;justify-content:space-between;
      margin-top:6px;padding-top:5px;
      border-top:1px solid var(--border);
    }
    .sig-time{font-size:10px;color:var(--muted)}
    .bybit-link{
      font-size:11px;color:var(--blue);text-decoration:none;
      background:rgba(82,136,193,.12);border-radius:6px;padding:2px 8px;
    }

    .empty{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      color:var(--muted);gap:10px;
    }
    .empty .icon{font-size:48px}

    /* ── Chart modal ── */
    #chart-modal{
      display:none;position:fixed;inset:0;z-index:100;
      background:rgba(0,0,0,.85);
      flex-direction:column;
    }
    #chart-modal.open{display:flex}
    .chart-header{
      background:var(--surface);
      padding:12px 14px;
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .chart-header h2{font-size:15px;font-weight:600}
    .chart-close{
      background:none;border:none;color:var(--muted);
      font-size:22px;cursor:pointer;padding:0 4px;
      line-height:1;
    }
    #chart-frame{
      flex:1;border:none;width:100%;background:#131722;
    }

    .chart-btn{
      font-size:11px;color:var(--blue);
      background:rgba(82,136,193,.12);border-radius:6px;padding:2px 8px;
      border:none;cursor:pointer;
    }

    /* ── Keyboard ── */
    #kb{
      background:var(--surface);
      border-top:1px solid var(--border);
      padding:7px;
      display:grid;grid-template-columns:1fr 1fr;
      gap:5px;flex-shrink:0;
    }
    .kb{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:9px;
      padding:9px 8px;
      color:var(--text);font-size:13px;
      cursor:pointer;text-align:center;
      transition:background .12s;
      user-select:none;
    }
    .kb:active{background:rgba(82,136,193,.25)}
    .kb.danger{color:var(--red);border-color:rgba(236,57,66,.2)}
    .kb.primary{color:var(--blue)}
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="avatar">🤖</div>
  <div class="hinfo">
    <h1>Gerchik Bot</h1>
    <div class="sub" id="sub">подключение...</div>
  </div>
  <div class="conn-dot" id="dot"></div>
</header>

<!-- Stats -->
<div class="stats">
  <div class="chip">💰 <b id="s-bal">—</b> USDT</div>
  <div class="chip">📡 сканов: <b id="s-sc">0</b></div>
  <div class="chip">📶 сигналов: <b id="s-sig">0</b></div>
  <div class="chip" id="pos-chip" style="display:none">📊 позиций: <b id="s-pos">0</b></div>
  <div class="chip">⏰ <b id="s-last">—</b></div>
</div>

<!-- Chat -->
<div id="chat">
  <div class="empty" id="empty">
    <div class="icon">🤖</div>
    <div>Ожидание сигналов...</div>
  </div>
</div>

<!-- Chart modal -->
<div id="chart-modal">
  <div class="chart-header">
    <h2 id="chart-title">График</h2>
    <button class="chart-close" onclick="closeChart()">✕</button>
  </div>
  <iframe id="chart-frame" allowfullscreen></iframe>
</div>

<!-- Keyboard -->
<div id="kb">
  <button class="kb" onclick="cmd('status')">📊 Статус</button>
  <button class="kb" onclick="cmd('balance')">💰 Баланс</button>
  <button class="kb" onclick="cmd('scan')">🔍 Скан</button>
  <button class="kb" onclick="cmd('signals')">📈 Сигналы</button>
  <button class="kb" onclick="cmd('positions')">📋 Позиции</button>
  <button class="kb" onclick="cmd('history')">📜 История</button>
  <button class="kb primary" onclick="cmd('all')">🚀 Все сигналы</button>
  <button class="kb danger" onclick="cmd('diag')">🔧 Диагностика</button>
</div>

<script>
'use strict';
let scanCount=0, lastAt=null, sigCount=0, seenSigs=new Set(), scanInProgress=false;

const escHtml=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

/* ── Format helpers ── */
const fNum=(n,d=4)=>typeof n==='number'?n.toFixed(d):'—';
const fTime=iso=>{if(!iso)return'—';const d=new Date(iso);return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'})};
const fPct=(n,d=2)=>typeof n==='number'?(n>=0?'+':'')+n.toFixed(d)+'%':'—';
const scoreClass=s=>s>=70?'s-hi':s>=45?'s-md':'s-lo';

/* ── Chat helpers ── */
const chat=document.getElementById('chat');

function clearEmpty(){const e=document.getElementById('empty');if(e)e.remove()}

function addBotMsg(html){
  clearEmpty();
  const d=document.createElement('div');
  d.className='msg';d.innerHTML=html;
  chat.appendChild(d);chat.scrollTop=9e9;
}

function addUserMsg(text){
  const d=document.createElement('div');
  d.className='msg-u';d.textContent=text;
  chat.appendChild(d);chat.scrollTop=9e9;
}

function addSep(text){
  const d=document.createElement('div');
  d.className='date-sep';d.textContent=text;
  chat.appendChild(d);
}

/* ── Signal bubble ── */
const TYPES={'ACCUMULATION':'📈 Накопление','DISTRIBUTION':'📉 Распределение','SQUEEZE':'💥 Сквиз','VOLUME_SPIKE':'📊 Объём','FUNDING_EXTREME':'💸 Фандинг','MOMENTUM':'⚡ Импульс'};

function addSig(s,prepend=false){
  clearEmpty();
  const isL=s.direction==='LONG';
  const sc=s.score||0;
  const price=s.price||s.entry||0;
  const decimals=price>100?2:price>1?4:6;

  const el=document.createElement('div');
  el.className='sig';
  el.innerHTML=`
    <div class="sig-stripe ${isL?'long-stripe':'short-stripe'}"></div>
    <div class="sig-body">
      <div class="sig-head">
        <span class="sym">${s.symbol}</span>
        <span class="dir ${isL?'long-dir':'short-dir'}">${isL?'🟢 LONG':'🔴 SHORT'}</span>
        <span class="type-tag">${TYPES[s.signal_type]||escHtml(s.signal_type)||''}</span>
        <span class="score ${scoreClass(sc)}">${sc}/100</span>
      </div>

      <div class="levels">
        <div class="lv sl-lv">
          <div class="ll">🛑 SL</div>
          <div class="lp">${fNum(s.sl,decimals)}</div>
        </div>
        <div class="lv entry-lv">
          <div class="ll">💵 Вход</div>
          <div class="lp">${fNum(s.entry||price,decimals)}</div>
        </div>
        <div class="lv tp-lv">
          <div class="ll">🎯 TP2</div>
          <div class="lp">${fNum(s.tp2,decimals)}</div>
        </div>
        <div class="lv tp-lv">
          <div class="ll">🚀 TP3</div>
          <div class="lp">${fNum(s.tp3,decimals)}</div>
        </div>
      </div>

      <div class="sig-stats">
        <div class="stat-pill">📈 OI <b>${fPct(s.oi_change,1)}</b></div>
        <div class="stat-pill">📊 Объём <b>${typeof s.vol_ratio==='number'?s.vol_ratio.toFixed(1)+'x':'—'}</b></div>
        <div class="stat-pill">💸 Фандинг <b>${fPct(s.funding,3)}</b></div>
        <div class="stat-pill">📐 ATR <b>${typeof s.atr_pct==='number'?s.atr_pct.toFixed(2)+'%':'—'}</b></div>
        ${s.sl_pct?`<div class="stat-pill">⛔ SL <b>-${fNum(s.sl_pct,2)}%</b></div>`:''}
        ${s.rr?`<div class="stat-pill">⚖️ R/R <b>1:${fNum(s.rr,1)}</b></div>`:''}
      </div>

      <div class="sig-foot">
        <span class="sig-time">⏰ ${fTime(s.ts)}</span>
        <div style="display:flex;gap:6px">
          <button class="chart-btn" data-sym="${escHtml(s.symbol)}">📊 График</button>
          <a class="bybit-link" href="https://www.bybit.com/trade/usdt/${s.symbol}" target="_blank">↗ Bybit</a>
        </div>
      </div>
    </div>
  `;
  const chartBtn=el.querySelector('.chart-btn');
  if(chartBtn)chartBtn.onclick=()=>openChart(s.symbol);
  if(prepend)chat.insertBefore(el,chat.firstChild);
  else{chat.appendChild(el);chat.scrollTop=9e9;}
}

/* ── Stats ── */
function updateStats(){
  document.getElementById('s-sc').textContent=scanCount;
  document.getElementById('s-sig').textContent=sigCount;
  if(lastAt)document.getElementById('s-last').textContent=fTime(lastAt);
}

async function refreshBalance(){
  try{
    const d=await fetch('/api/balance').then(r=>r.json());
    document.getElementById('s-bal').textContent=d.balance>0?d.balance.toFixed(2):'—';
  }catch(e){}
}

async function refreshPositions(){
  try{
    const d=await fetch('/api/positions').then(r=>r.json());
    const n=(d.positions||[]).filter(Boolean).length;
    document.getElementById('s-pos').textContent=n;
    document.getElementById('pos-chip').style.display=n>0?'':'none';
  }catch(e){}
}

/* ── WebSocket ── */
let ws,wsR=0;
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen=()=>{
    wsR=0;
    document.getElementById('dot').className='conn-dot ok';
    document.getElementById('sub').textContent='онлайн';
    refreshBalance();refreshPositions();
  };
  ws.onmessage=e=>{
    const m=JSON.parse(e.data);
    if(m.type==='history'){
      const rows=(m.data||[]).slice(0,15).reverse();
      if(rows.length){addSep('история');rows.forEach(s=>addSig(s));sigCount=rows.length;updateStats();}
    }
    if(m.type==='signal'){
      const s=m.data,k=s.symbol+(s.ts||'');
      if(!seenSigs.has(k)){seenSigs.add(k);sigCount++;addSig(s);updateStats();}
    }
    if(m.type==='heartbeat'){
      scanCount=m.scan_count||scanCount;
      lastAt=m.last_scan_at||lastAt;
      sigCount=m.signals_found!==undefined?m.signals_found:sigCount;
      updateStats();refreshPositions();
    }
  };
  ws.onclose=()=>{
    document.getElementById('dot').className='conn-dot err';
    document.getElementById('sub').textContent='переподключение...';
    setTimeout(connect,Math.min(1e3*2**wsR++,30e3));
  };
}

/* ── Commands ── */
const CMDS={
  status:'📊 Статус',
  balance:'💰 Баланс',
  scan:'🔍 Запустить скан',
  signals:'📈 Последние сигналы',
  positions:'📋 Позиции',
  history:'📜 История сделок',
  all:'🚀 Все сигналы за 24ч',
  diag:'🔧 Диагностика',
};

async function cmd(name){
  addUserMsg(CMDS[name]||name);
  switch(name){
    case'status': await doStatus();break;
    case'balance': await doBalance();break;
    case'scan': await doScan();break;
    case'signals': await doSignals();break;
    case'positions': await doPositions();break;
    case'history': await doHistory();break;
    case'all': await doAll();break;
    case'diag': await doDiag();break;
  }
}

async function doStatus(){
  try{
    const[br,pr,sr]=await Promise.all([
      fetch('/api/balance').then(r=>r.json()),
      fetch('/api/positions').then(r=>r.json()),
      fetch('/api/stats').then(r=>r.json()),
    ]);
    const bal=br.balance>0?`<b style="color:var(--green)">${br.balance.toFixed(2)} USDT</b>`:'<b>— USDT</b>';
    const pos=(pr.positions||[]).filter(Boolean).length;
    addBotMsg(
      `<b>📊 Статус бота</b><br><br>`+
      `💰 Баланс: ${bal}<br>`+
      `📡 Сканов: <b>${sr.scan_count||0}</b><br>`+
      `📶 Сигналов за 24ч: <b>${sr.total_24h||0}</b><br>`+
      `📋 Открытых позиций: <b>${pos}</b><br>`+
      `⏰ Последний скан: <b>${fTime(sr.last_scan_at)}</b>`
    );
  }catch(e){addBotMsg('❌ Ошибка получения статуса')}
}

async function doBalance(){
  try{
    const d=await fetch('/api/balance').then(r=>r.json());
    const bal=d.balance>0
      ?`<b style="color:var(--green)">${d.balance.toFixed(2)} USDT</b>`
      :`<b>0 USDT</b> — пополни аккаунт на Bybit`;
    addBotMsg(`💰 Баланс: ${bal}`);
  }catch(e){addBotMsg('❌ Ошибка')}
}

async function doScan(){
  if(scanInProgress){addBotMsg('⏳ Скан уже выполняется...');return;}
  scanInProgress=true;
  addBotMsg('⏳ Сканирую рынок... подождите 30-60 сек');
  try{
    const d=await fetch('/api/scan').then(r=>r.json());
    if(d.error){addBotMsg(`❌ ${d.error}`);return}
    let html=`✅ <b>Скан завершён</b><br>📶 Найдено сигналов: <b>${d.signals_found}</b>`;
    if(d.top10&&d.top10.length){
      html+=`<br><br><b>Топ сигналы:</b><br>`;
      d.top10.slice(0,5).forEach(s=>{
        const ic=s.direction==='LONG'?'🟢':'🔴';
        html+=`${ic} <b>${escHtml(s.symbol)}</b> ${s.score}/100 — ${TYPES[s.signal_type]||escHtml(s.signal_type)}<br>`;
      });
    }
    addBotMsg(html);
    if(d.top10)d.top10.slice(0,3).forEach(s=>{
      const k=s.symbol+(s.ts||'');
      if(!seenSigs.has(k)){seenSigs.add(k);addSig(s);}
    });
  }catch(e){addBotMsg('❌ Ошибка сканирования')}
  finally{scanInProgress=false;}
}

async function doSignals(){
  try{
    const d=await fetch('/api/signals?limit=10&hours=6').then(r=>r.json());
    const rows=d.signals||[];
    if(!rows.length){addBotMsg('📭 Нет сигналов за последние 6 часов');return}
    addBotMsg(`📈 Последние сигналы (${rows.length} шт):`);
    rows.slice(0,5).forEach(s=>addSig(s));
  }catch(e){addBotMsg('❌ Ошибка')}
}

async function doPositions(){
  try{
    const d=await fetch('/api/positions').then(r=>r.json());
    const pos=(d.positions||[]).filter(Boolean);
    if(!pos.length){addBotMsg('📭 Открытых позиций нет');return}
    let html=`<b>📋 Открытые позиции (${pos.length}):</b><br><br>`;
    pos.forEach(p=>{
      const ic=p.direction==='LONG'?'🟢':'🔴';
      const pnl=p.unrealised_pnl;
      const pnlStr=pnl?` | P&L: <b style="color:${pnl>0?'var(--green)':'var(--red)}'>${pnl>0?'+':''}${pnl.toFixed(2)}$</b>`:'';
      html+=`${ic} <b>${p.symbol}</b> × ${p.qty}${pnlStr}<br>`;
      html+=`&nbsp;&nbsp;&nbsp;Вход: ${p.entry} | SL: ${p.sl}<br>`;
    });
    addBotMsg(html);
  }catch(e){addBotMsg('❌ Ошибка')}
}

async function doHistory(){
  try{
    const d=await fetch('/api/trades?limit=10').then(r=>r.json());
    const trades=d.trades||[];
    if(!trades.length){addBotMsg('📭 История сделок пуста');return}
    let html=`<b>📜 Последние сделки:</b><br><br>`;
    trades.forEach(t=>{
      const ic=t.side==='Buy'?'🟢':'🔴';
      const pnl=t.pnl?(t.pnl>0?`<b style="color:var(--green)">+${t.pnl.toFixed(2)}$</b>`:`<b style="color:var(--red)">${t.pnl.toFixed(2)}$</b>`):'';
      const st=t.status==='closed'?'✅':'⏳';
      html+=`${st} ${ic} <b>${t.symbol}</b> ${pnl?'| '+pnl:''}<br>`;
    });
    addBotMsg(html);
  }catch(e){addBotMsg('❌ Ошибка')}
}

async function doAll(){
  try{
    const d=await fetch('/api/signals?limit=30&hours=24').then(r=>r.json());
    const rows=d.signals||[];
    if(!rows.length){addBotMsg('📭 Нет сигналов за 24 часа');return}
    addBotMsg(`🚀 Все сигналы за 24ч — <b>${rows.length}</b> шт:`);
    rows.slice(0,10).forEach(s=>addSig(s));
    if(rows.length>10)addBotMsg(`📌 Показано 10 из ${rows.length}`);
  }catch(e){addBotMsg('❌ Ошибка')}
}

async function doDiag(){
  addBotMsg('⏳ Проверяю соединение с Bybit...');
  try{
    const d=await fetch('/api/diagnostic').then(r=>r.json());
    let html=`<b>🔧 Диагностика</b><br><br>`;
    html+=`📡 Тикеров Bybit: <b>${d.tickers_usdt||0}</b><br>`;
    html+=`📊 Klines: <b>${d.kline_records||0}</b><br>`;
    html+=`📈 OI записей: <b>${d.oi_records||0}</b><br>`;
    if(d.balance_usdt!==undefined)
      html+=`💰 Баланс API: <b ${d.balance_usdt>0?'style="color:var(--green)"':''}>${d.balance_usdt} USDT</b><br>`;
    html+=`<br>${d.verdict||d.error||'—'}`;
    if(d.balance_warn)html+=`<br>⚠️ ${d.balance_warn}`;
    addBotMsg(html);
  }catch(e){addBotMsg('❌ Ошибка диагностики')}
}

/* ── Chart ── */
function openChart(symbol){
  // TradingView symbol format: BYBIT:BTCUSDT.P
  const tvSym='BYBIT:'+symbol+'.P';
  const url=`https://s.tradingview.com/widgetembed/?frameElementId=tv_chart&symbol=${tvSym}&interval=240&theme=dark&style=1&locale=ru&toolbar_bg=%23232e3c&enable_publishing=0&hide_top_toolbar=0&hide_legend=0&save_image=0&studies=RSI%40tv-basicstudies%1FVolume%40tv-basicstudies&withdateranges=1`;
  document.getElementById('chart-title').textContent='📊 '+symbol+' (4H)';
  document.getElementById('chart-frame').src=url;
  document.getElementById('chart-modal').classList.add('open');
  document.body.style.overflow='hidden';
  document.documentElement.style.overflow='hidden';
}
function closeChart(){
  document.getElementById('chart-modal').classList.remove('open');
  document.getElementById('chart-frame').src='';
  document.body.style.overflow='';
  document.documentElement.style.overflow='';
}
document.getElementById('chart-modal').addEventListener('click',function(e){
  if(e.target===this)closeChart();
});

/* ── Ping ── */
setInterval(()=>{if(ws&&ws.readyState===1)ws.send('ping')},30000);

/* ── Init ── */
connect();
setInterval(refreshBalance,60000);
setInterval(refreshPositions,30000);
